<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUDIO-SUMMARIZER — Resumidor de PDFs Inteligente</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <!-- Marked.js para renderizar Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div class="container">
        <header>
            <h1>Audio Summarizer</h1>
            <p class="subtitle">Ouvir é o novo ler. Resuma seus PDFs em segundos.</p>
        </header>

        <main>
            <div id="drop-zone" class="drop-zone">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
                <p id="file-name">Clique ou arraste um PDF aqui</p>
                <span>Tamanho máximo sugerido: 10MB</span>
                <input type="file" id="file-input" hidden accept="application/pdf">
            </div>

            <div class="controls">
                <div class="control-group">
                    <label>Idioma</label>
                    <select id="language">
                        <option value="pt">Português (BR)</option>
                        <option value="en">Inglês (EN)</option>
                        <option value="es">Espanhol (ES)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Gerar Áudio?</label>
                    <div class="toggle-group" id="audio-toggle">
                        <select id="audio">
                            <option value="false">Não</option>
                            <option value="true">Sim (Resumo Curto)</option>
                        </select>
                    </div>
                </div>

                <button id="btn-run" class="btn-primary" disabled>Resumir PDF</button>
            </div>

            <div id="loader" class="loader">
                <div class="spinner"></div>
                <p style="margin-top: 1rem; color: var(--text-muted)">Lendo PDF e processando com Gemini AI...</p>
                <p id="latency-warning" style="display:none; font-size: 0.8rem; color: #818cf8; margin-top: 0.5rem">
                    Gerando áudio... pode levar até 40 segundos.</p>
            </div>

            <section id="results" class="results">
                <h2>Resumo Gerado</h2>
                <div id="summary-content" class="summary-content"></div>

                <div id="audio-container" class="audio-player">
                    <p style="margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 600">Ouça o resumo:</p>
                    <audio id="audio-player" controls></audio>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
